services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trumplin
      POSTGRES_PASSWORD: trumplin
      POSTGRES_DB: trumplin
    ports:
      - "5432:5432"
    volumes:
      - trumplin_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      TRUMPLIN_DATABASE_DSN: postgres://trumplin:trumplin@postgres:5432/trumplin?sslmode=disable
      TRUMPLIN_JWT_SECRET: change_me_super_secret
      TRUMPLIN_HTTP_PORT: 8080
      TRUMPLIN_ACCESS_TOKEN_TTL_SECONDS: 900
      TRUMPLIN_COOKIE_SECURE: 0
      TRUMPLIN_ADMIN_EMAIL: admin@example.com
      TRUMPLIN_ADMIN_PASSWORD: change_me_admin_password
      YANDEX_GEOCODER_KEY: ${YANDEX_GEOCODER_KEY:-CHANGE_ME}
      YANDEX_GEOCODER_BASE_URL: https://geocode-maps.yandex.ru/1.x/
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NEXT_PUBLIC_YANDEX_API_KEY: ${YANDEX_JAVASCRIPT_API_KEY:-CHANGE_ME}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_YANDEX_API_KEY: ${YANDEX_JAVASCRIPT_API_KEY:-CHANGE_ME}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  trumplin_pgdata:

